name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Discover project info
        run: |
          echo "=== xcodeproj files ==="
          find . -name "*.xcodeproj" -maxdepth 3
          echo "=== schemes ==="
          xcodebuild -list 2>/dev/null || true

      - name: Build
        run: |
          xcodebuild build \
            -project TypingResearch.xcodeproj \
            -scheme TypingResearch \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO

      - name: Run tests
        run: |
          xcodebuild test \
            -project TypingResearch.xcodeproj \
            -scheme TypingResearch \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO