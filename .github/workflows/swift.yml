name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild build \
            -project TypingResearch.xcodeproj \
            -scheme TypingResearch \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro Max,OS=latest' \
            CODE_SIGNING_ALLOWED=NO

      - name: Run tests
        run: |
          xcodebuild test \
            -project TypingResearch.xcodeproj \
            -scheme TypingResearch \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro Max,OS=latest' \
            CODE_SIGNING_ALLOWED=NO